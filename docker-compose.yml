version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: parking_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/parking_db
      VIDEO_SOURCE: ""
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./videos:/app/videos
      - ./exports:/app/exports

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "3001:3000"
    environment:
      REACT_APP_API_BASE: http://localhost:8000
      REACT_APP_WS_BASE: ws://localhost:8000
      CHOKIDAR_USEPOLLING: "true"

volumes:
  pgdata:
